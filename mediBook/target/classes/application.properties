# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=medicine-booking-backend

# MYSQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/medibook
spring.datasource.username=root
spring.datasource.password=Root@123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

logging.level.org.hibernate.SQL=DEBUG

# Optional: For MongoDB Atlas Cloud
# spring.data.mongodb.uri=mongodb+srv://username:password@cluster.mongodb.net/medibook

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationChangeMeInProduction2024
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging
logging.level.root=INFO
logging.level.com.medibook=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Date Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata